<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English-Word</title>

    <!-- Font Awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Daisy + tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- style-css  -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1 class="text-4xl text-green-400 font-bold text-center py-20">This is a practice projected in English Word</h1>

    <!-- Dynamic Button  -->
    <section id="btn-Container" class="w-[85%] mx-auto flex gap-5 justify-center items-center flex-wrap ">

    </section>


    <section id="spinner" class="flex items-center justify-center py-10 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>

    <!-- Dynamic word Box  -->
    <section id="word-Container"
        class="w-[85%] mx-auto bg-slate-200 p-10 my-10 grid grid-cols-1    md:grid-cols-2 lg:grid-cols-3 gap-6">

        <div class="text-center col-span-full bg-white p-10 rounded-md space-y-3">
            <!-- <img class="w-[100px] mx-auto" src="./images/pngtree-attention-security-alert-illustration-png-image_4548851.jpg" alt=""> -->
            <h2 class="text-4xl"> No Data Found</h2>
            <p class="text-2xl">Plz! Return The Next Page</p>
        </div>

    </section>

    <section>
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
        <dialog id="my_modal_1" class="modal">
            <div class="modal-box">
                <div id="info-Container">
                  <!-- Dynamically loaded  -->
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>


    <script src="./index.js"></script>
</body>

</html>
